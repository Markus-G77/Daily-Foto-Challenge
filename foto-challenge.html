<script>
const PLAYERS = ["Markus", "Marion", "Levy", "Chey"];
const MOTTOS = [

// ── Countdown ────────────────────────────────────────────────────────────────
function getCountdown() {
  const target = new Date("2026-08-01T00:00:00");
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) return null;
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000)  / 60000);
  const secs  = Math.floor((diff % 60000)    / 1000);
  return { days, hours, mins, secs, diff };
}

function renderCountdown(app) {
  if (localStorage.getItem("fc_bypass_cd")) { boot(); return; }
  const cd = getCountdown();
  if (!cd) { boot(); return; }
  app.innerHTML = `
    <div class="countdown-screen">
      <div class="cd-top">Toskana · August 2026</div>
      <div class="cd-logo">📷</div>
      <div class="cd-tagline">Jeder Moment zählt.<br>Wer drückt am besten ab?</div>
      <div class="cd-sub">Das große Familien-Fotospiel startet bald.</div>
      <div class="cd-tiles">
        <div class="cd-tile"><div class="cd-num">${cd.days}</div><div class="cd-unit">Tage</div></div>
        <div class="cd-tile"><div class="cd-num">${String(cd.hours).padStart(2,'0')}</div><div class="cd-unit">Std</div></div>
        <div class="cd-tile"><div class="cd-num">${String(cd.mins).padStart(2,'0')}</div><div class="cd-unit">Min</div></div>
        <div class="cd-tile"><div class="cd-num">${String(cd.secs).padStart(2,'0')}</div><div class="cd-unit">Sek</div></div>
      </div>
      <div class="cd-date">Start: 1. August 2026</div>
      <button class="cd-bypass" onclick="bypassCountdown()">Entwicklermodus</button>
    </div>`;
  setTimeout(() => renderCountdown(app), 1000);
}

window.bypassCountdown = function() {
  localStorage.setItem("fc_bypass_cd", "1");
  boot();
};

// ── Storage: JSONBin ──────────────────────────────────────────────────────────
// JSONBin.io: free, no account needed to read, master key needed to create/write
// We store BIN_ID and API_KEY in localStorage (Markus sets it up once)

const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";
let BIN_ID = localStorage.getItem("fc_bin_id") || "";
let API_KEY = localStorage.getItem("fc_api_key") || "";

async function loadShared() {
  if (!BIN_ID) return null;
  try {
    const r = await fetch(`${JSONBIN_BASE}/${BIN_ID}/latest`, {
      headers: { "X-Master-Key": API_KEY }
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j.record;
  } catch { return null; }
}

async function saveShared(data) {
  if (!BIN_ID) return false;
  try {
    const r = await fetch(`${JSONBIN_BASE}/${BIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch { return false; }
}

async function createBin(initialData) {
  // Store only appState + empty photoBins index (photos go in separate bins)
  const payload = { appState: initialData.appState || initialData, photoBins: {} };
  const r = await fetch(JSONBIN_BASE, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY, "X-Bin-Private": "true" },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error("Bin konnte nicht erstellt werden");
  const j = await r.json();
  return j.metadata.id;
}

// ── Image compression ─────────────────────────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    // For very large files: first shrink via a FileReader + smaller intermediate step
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        // Two-pass downscale for huge images (>4000px) to avoid canvas memory crash
        const maxSide = 800;
        let { width, height } = img;
        
        // If image is huge, draw to intermediate canvas first at 50% to reduce memory
        if (Math.max(width, height) > 4000) {
          const mid = document.createElement("canvas");
          mid.width = Math.round(width * 0.4);
          mid.height = Math.round(height * 0.4);
          mid.getContext("2d").drawImage(img, 0, 0, mid.width, mid.height);
          width = mid.width;
          height = mid.height;
          // Now scale from mid canvas
          const scale = Math.min(1, maxSide / Math.max(width, height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(width * scale);
          canvas.height = Math.round(height * scale);
          canvas.getContext("2d").drawImage(mid, 0, 0, canvas.width, canvas.height);
          resolve(pickQuality(canvas));
        } else {
          const scale = Math.min(1, maxSide / Math.max(width, height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(width * scale);
          canvas.height = Math.round(height * scale);
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(pickQuality(canvas));
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function pickQuality(canvas) {
  const qualities = [0.65, 0.5, 0.38, 0.25, 0.15, 0.08];
  let result;
  for (const q of qualities) {
    result = canvas.toDataURL("image/jpeg", q);
    if (result.length < 90000) break;
  }
  return result;
}

// ── App state ─────────────────────────────────────────────────────────────────
let state = {
  screen: "loading", // loading | config | name | app
  myName: localStorage.getItem("fc_me") || null,
  tab: "upload",
  shared: null,      // { appState, photos }
  myRatings: {},
  uploading: false,
  saving: false,
  error: null,
  pollTimer: null,
};

function initShared() {
  return {
    appState: {
      currentDay: 0,
      dayStarted: new Date().toISOString(),
      yesterdayWinner: null,
      ratings: {},
    },
    photos: { today: {}, yesterday: {} },
    photoBins: {}
  };
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const s = state;

  if (s.screen === "loading") {
    app.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p class="spinner-text">Lade…</p></div>`;
    return;
  }

  if (s.screen === "config") {
    renderConfig(app);
    return;
  }

  if (s.screen === "name") {
    renderNameScreen(app);
    return;
  }

  renderApp(app);
}

function renderConfig(app) {
  app.innerHTML = `
    <div class="config-screen">
      <span style="font-size:48px">⚙️</span>
      <h2 style="margin-top:12px">Einmalige Einrichtung</h2>
      <p>Damit alle 4 Handys dieselben Daten sehen, brauchen wir einen kostenlosen Online-Speicher.<br><br>
      Geh auf <strong>jsonbin.io</strong> → kostenlos registrieren → unter <em>API Keys</em> deinen <strong>Master Key</strong> kopieren.</p>

      <input class="config-input" id="cfg-key" placeholder="Master Key ($2b$12$...)" value="${API_KEY}" />
      <button class="config-save-btn" onclick="handleConfigSave()">Speichern & starten</button>
      <p class="config-note">Der Key wird nur auf diesem Gerät gespeichert. Du teilst danach nur die <code>bin_id</code> mit den anderen — nicht den Key.<br><br>
      Alternativ: Wenn du schon eine Bin-ID hast:<br></p>
      <input class="config-input" id="cfg-binid" placeholder="Bin-ID (optional, falls schon vorhanden)" value="${BIN_ID}" style="margin-top:8px" />
    </div>`;
}

async function handleConfigSave() {
  const key = document.getElementById("cfg-key").value.trim();
  const binid = document.getElementById("cfg-binid").value.trim();
  if (!key) { alert("Bitte Master Key eingeben"); return; }
  API_KEY = key;
  localStorage.setItem("fc_api_key", key);

  if (binid) {
    BIN_ID = binid;
    localStorage.setItem("fc_bin_id", binid);
    await boot();
    return;
  }

  // Create new bin
  try {
    const id = await createBin(initShared());
    BIN_ID = id;
    localStorage.setItem("fc_bin_id", id);
    alert(`✅ Fertig! Deine Bin-ID: ${id}\n\nTeile diese ID mit Marion, Levy und Chey — sie tragen sie beim ersten Start ein.`);
    await boot();
  } catch (e) {
    alert("Fehler beim Erstellen: " + e.message);
  }
}

function renderNameScreen(app) {
  app.innerHTML = `
    <div class="name-screen">
      <span class="logo-emoji">📷</span>
      <div class="logo-title">FotoChallenge</div>
      <div class="logo-sub">Toskana 2026</div>
      <p class="name-prompt">Wer bist du?</p>
      <div class="name-grid">
        ${PLAYERS.map(p => `<button class="name-btn" onclick="selectName('${p}')">${p}</button>`).join("")}
      </div>
    </div>`;
}

function selectName(name) {
  state.myName = name;
  localStorage.setItem("fc_me", name);
  state.screen = "app";
  state.tab = "upload";
  render();
  startPolling();
}

function renderApp(app) {
  const { myName, shared, tab, myRatings, uploading, saving, error } = state;
  if (!shared) {
    app.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p class="spinner-text">Verbinde…</p></div>`;
    return;
  }

  const { appState, photos } = shared;
  const day = appState.currentDay;
  const motto = MOTTOS[day % MOTTOS.length];
  const todayPhotos = photos.today || {};
  const yesterdayPhotos = photos.yesterday || {};
  const myPhotoToday = todayPhotos[myName];
  const others = PLAYERS.filter(p => p !== myName);
  const ratedCount = others.filter(p => myRatings[p] !== undefined).length;
  const ranking = computeRanking(appState);
  const todayScores = getTodayScores(appState, day);

  const tabs = [
    { key: "upload", label: "📤 Foto", badge: myPhotoToday ? "✓" : null },
    { key: "rate",   label: "⭐ Werten", badge: ratedCount > 0 ? `${ratedCount}/3` : null },
    { key: "yesterday", label: "🏆 Gestern" },
    { key: "ranking",   label: "📊 Gesamt" },
  ];

  let contentHtml = "";

  if (tab === "upload") {
    const allUploaded = PLAYERS.every(p => todayPhotos[p]);
    contentHtml = `
      <h2 class="section-title">Dein Foto heute</h2>
      <p class="hint">Thema: <strong>${motto}</strong></p>
      ${error ? `<div class="error-banner">${error}</div>` : ""}
      ${myPhotoToday
        ? `<img class="my-photo" src="${myPhotoToday}" alt="Mein Foto" onclick="openLightbox(this.src,'Mein Foto')" style="cursor:pointer"><p class="hint">✓ Hochgeladen. Du kannst es ersetzen:</p>`
        : `<div class="upload-placeholder" onclick="document.getElementById('file-input').click()">
            <span class="big-emoji">📷</span><p>Foto auswählen</p>
           </div>`
      }
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleUpload(this)">
      <button class="primary-btn" onclick="document.getElementById('file-input').click()" ${uploading ? "disabled" : ""}>
        ${uploading ? "Wird hochgeladen…" : myPhotoToday ? "Foto ersetzen" : "Foto hochladen"}
      </button>
      ${myPhotoToday ? `<button class="delete-btn" onclick="deleteMyPhoto()">🗑 Mein Foto löschen</button>` : ""}
      <div class="divider"></div>
      <h3 class="sub-title">Wer hat heute schon hochgeladen:</h3>
      <div class="thumb-grid">
        ${PLAYERS.map(p => `
          <div class="thumb-item">
            ${todayPhotos[p]
              ? `<img class="thumb" src="${todayPhotos[p]}" alt="${p}" onclick="openLightbox(this.src,'${p}')" style="cursor:pointer">`
              : `<div class="thumb-empty">⏳</div>`}
            <span class="thumb-name">${p}</span>
          </div>`).join("")}
      </div>
      ${allUploaded && myName === "Markus" ? `
        <div class="admin-box">
          <p>Alle haben ihr Foto — nächsten Tag starten?</p>
          <button class="danger-btn" onclick="advanceDay()">→ Tag ${day + 2} starten</button>
        </div>` : ""}`;
  }

  if (tab === "rate") {
    contentHtml = `
      <h2 class="section-title">Fotos bewerten</h2>
      <p class="hint">Thema: <strong>${motto}</strong></p>
      ${error ? `<div class="error-banner">${error}</div>` : ""}
      ${others.map(person => {
        const photo = todayPhotos[person];
        const currentVal = myRatings[person] ?? 5.0;
        return `
          <div class="rate-card">
            ${photo
              ? `<img class="rate-photo" src="${photo}" alt="${person}" onclick="openLightbox(this.src,'${person}')" style="cursor:pointer">`
              : `<div class="rate-empty">⏳ ${person} hat noch nicht hochgeladen</div>`}
            <div class="rate-row">
              <span class="rate-name">${person}</span>
              <span class="rate-score">${myRatings[person] !== undefined ? myRatings[person].toFixed(1) : "–"}</span>
            </div>
            ${photo ? `
              <div class="slider-row">
                <span class="slider-label">0</span>
                <input type="range" min="0" max="10" step="0.5" value="${currentVal}"
                  oninput="previewRating('${person}', this.value)"
                  onchange="saveRating('${person}', parseFloat(this.value))">
                <span class="slider-label">10</span>
              </div>` : ""}
          </div>`;
      }).join("")}
      ${saving ? `<p class="saving-hint">Speichern…</p>` : ""}
      <div class="divider"></div>
      <h3 class="sub-title">Aktueller Stand heute</h3>
      ${PLAYERS.map(p => `
        <div class="stand-row">
          <span>${p}</span>
          <span class="stand-score">${todayScores[p] !== null ? `⭐ ${todayScores[p]}` : "–"}</span>
        </div>`).join("")}`;
  }

  if (tab === "yesterday") {
    const prevMotto = day > 0 ? MOTTOS[(day - 1) % MOTTOS.length] : null;
    contentHtml = `
      <h2 class="section-title">${day === 0 ? "Noch kein Vortag" : `Tag ${day} · ${prevMotto}`}</h2>
      ${appState.yesterdayWinner ? `<div class="winner-banner">🏆 <strong>${appState.yesterdayWinner}</strong> hat gestern gewonnen!</div>` : ""}
      ${day === 0
        ? `<p class="hint">Das ist der erste Tag — noch keine Vortagsfotos.</p>`
        : PLAYERS.map(p => {
            const photo = yesterdayPhotos[p];
            const dr = appState.ratings?.[day - 1] || {};
            const vals = Object.entries(dr).filter(([r]) => r !== p).map(([, rated]) => rated[p]).filter(v => v !== undefined);
            const avg = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length).toFixed(1) : null;
            return `
              <div class="rate-card">
                ${photo ? `<img class="rate-photo" src="${photo}" alt="${p}" onclick="openLightbox(this.src,'${p}')" style="cursor:pointer">` : `<div class="rate-empty">Kein Foto</div>`}
                <div class="rate-row">
                  <span class="rate-name">${p}</span>
                  <span class="rate-score">${avg ? `⭐ ${avg}` : "–"}</span>
                </div>
              </div>`;
          }).join("")}`;
  }

  if (tab === "ranking") {
    contentHtml = `
      <h2 class="section-title">Gesamtranking</h2>
      <p class="hint">Tag ${day + 1} von 20</p>
      ${ranking.map((e, i) => `
        <div class="rank-row ${i === 0 ? "first" : ""}">
          <span class="rank-pos">${["🥇","🥈","🥉"][i] || (i+1)+"."}</span>
          <span class="rank-name">${e.name}</span>
          <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(e.avg/10)*100}%"></div></div>
          <span class="rank-score">${e.avg.toFixed(2)}</span>
          <span class="rank-votes">(${e.votes}⭐)</span>
        </div>`).join("")}
      ${day >= 19 ? `<div class="final-banner">🎉 Urlaub vorbei! Gesamtsieger: <strong>${ranking[0]?.name}</strong>!</div>` : ""}
      <button class="refresh-btn" onclick="loadAndRender()">↻ Aktualisieren</button>`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <span class="header-emoji">📷</span>
        <div>
          <div class="header-title">FotoChallenge</div>
          <div class="header-sub">Tag ${day + 1} · ${myName} <button class="logout-btn" style="display:inline;padding:2px 8px;font-size:10px;margin-left:6px;" onclick="logout()">↩ wechseln</button></div>
        </div>
      </div>
      <div class="motto-tag">
        <span class="motto-label">Motto</span>
        <span class="motto-text">${motto}</span>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(t => `
        <button class="tab ${tab === t.key ? "active" : ""}" onclick="switchTab('${t.key}')">
          ${t.label}
          ${t.badge ? `<span class="badge">${t.badge}</span>` : ""}
        </button>`).join("")}
    </div>
    <div class="content">${contentHtml}</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.error = null;
  render();
}

function previewRating(person, value) {
  state.myRatings = { ...state.myRatings, [person]: parseFloat(value) };
  // Just update the score display without full re-render
  const scoreEl = document.querySelector(`.rate-card .rate-name`);
  // Find the right card — simpler: just update via querySelectorAll
  const cards = document.querySelectorAll(".rate-card");
  const others = PLAYERS.filter(p => p !== state.myName);
  others.forEach((name, i) => {
    if (name === person && cards[i]) {
      const scoreSpan = cards[i].querySelector(".rate-score");
      if (scoreSpan) scoreSpan.textContent = parseFloat(value).toFixed(1);
    }
  });
}

async function saveRating(person, value) {
  if (!state.myName || person === state.myName) return;
  state.myRatings = { ...state.myRatings, [person]: value };
  state.saving = true;

  const day = state.shared.appState.currentDay;
  const newRatings = {
    ...state.shared.appState.ratings,
    [day]: {
      ...(state.shared.appState.ratings?.[day] || {}),
      [state.myName]: {
        ...(state.shared.appState.ratings?.[day]?.[state.myName] || {}),
        [person]: value,
      },
    },
  };
  const newShared = {
    ...state.shared,
    appState: { ...state.shared.appState, ratings: newRatings }
  };
  const ok = await saveShared(newShared);
  if (ok) {
    state.shared = newShared;
    state.error = null;
  } else {
    state.error = "Speichern fehlgeschlagen. Bitte nochmal versuchen.";
  }
  state.saving = false;
  render();
}

async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  state.uploading = true;
  state.error = null;
  render();
  try {
    const compressed = await compressImage(file);
    const newPhotos = {
      ...state.shared.photos,
      today: { ...(state.shared.photos.today || {}), [state.myName]: compressed }
    };
    const newShared = { ...state.shared, photos: newPhotos };
    const ok = await saveShared(newShared);
    if (ok) {
      state.shared = newShared;
      state.tab = "rate";
    } else {
      state.error = "Upload fehlgeschlagen. Bitte nochmal versuchen.";
    }
  } catch (e) {
    state.error = "Fehler: " + (e.message || e) + " | Dateigröße: " + (file ? Math.round(file.size/1024) + "KB" : "?");
  }
  state.uploading = false;
  render();
}

async function advanceDay() {
  if (!state.shared) return;
  const { appState, photos } = state.shared;
  const newDay = appState.currentDay + 1;
  if (newDay > 20) return;

  // Compute winner
  const dayRatings = appState.ratings?.[appState.currentDay] || {};
  const scores = {};
  PLAYERS.forEach(p => { scores[p] = []; });
  Object.entries(dayRatings).forEach(([rater, rated]) => {
    Object.entries(rated).forEach(([ratee, score]) => {
      if (rater !== ratee) scores[ratee].push(score);
    });
  });
  const winner = Object.entries(scores)
    .map(([p, s]) => ({ name: p, avg: s.length ? s.reduce((a,b)=>a+b,0)/s.length : 0 }))
    .sort((a,b) => b.avg - a.avg)[0]?.name || null;

  const newShared = {
    appState: {
      ...appState,
      currentDay: newDay,
      dayStarted: new Date().toISOString(),
      yesterdayWinner: winner,
    },
    photos: { today: {}, yesterday: photos.today || {} }
  };

  const ok = await saveShared(newShared);
  if (ok) {
    state.shared = newShared;
    state.myRatings = {};
    state.tab = "upload";
  } else {
    state.error = "Fehler beim Tageswechsel.";
  }
  render();
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function computeRanking(appState) {
  const totals = {}, counts = {};
  PLAYERS.forEach(p => { totals[p] = 0; counts[p] = 0; });
  Object.values(appState.ratings || {}).forEach(dayRatings => {
    Object.entries(dayRatings).forEach(([rater, rated]) => {
      Object.entries(rated).forEach(([ratee, score]) => {
        if (rater !== ratee) { totals[ratee] += score; counts[ratee]++; }
      });
    });
  });
  return PLAYERS
    .map(p => ({ name: p, avg: counts[p] ? totals[p]/counts[p] : 0, votes: counts[p] }))
    .sort((a, b) => b.avg - a.avg);
}

function getTodayScores(appState, day) {
  const dayRatings = appState.ratings?.[day] || {};
  const scores = {};
  PLAYERS.forEach(p => { scores[p] = []; });
  Object.entries(dayRatings).forEach(([rater, rated]) => {
    Object.entries(rated).forEach(([ratee, score]) => {
      if (rater !== ratee) scores[ratee].push(score);
    });
  });
  return Object.fromEntries(
    Object.entries(scores).map(([p, s]) => [p, s.length ? (s.reduce((a,b)=>a+b,0)/s.length).toFixed(1) : null])
  );
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function loadAndRender() {
  const data = await loadShared();
  if (data) {
    state.shared = data;
    // Sync my ratings for today
    const day = data.appState.currentDay;
    state.myRatings = data.appState.ratings?.[day]?.[state.myName] || {};
  }
  render();
}

function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(loadAndRender, 20000);
}

async function boot() {
  state.screen = "loading";
  render();
  // Show countdown until Aug 1 unless bypassed
  const bypass = localStorage.getItem("fc_bypass_cd");
  if (!bypass && getCountdown()) {
    renderCountdown(document.getElementById("app"));
    return;
  }

  if (!BIN_ID || !API_KEY) {
    state.screen = "config";
    render();
    return;
  }

  const data = await loadShared();
  if (!data) {
    state.screen = "config";
    render();
    return;
  }

  state.shared = data;

  if (!state.myName) {
    state.screen = "name";
  } else {
    state.screen = "app";
    const day = data.appState.currentDay;
    state.myRatings = data.appState.ratings?.[day]?.[state.myName] || {};
    startPolling();
  }

  render();
}

// Expose all functions used in onclick= attributes to global scope

window.logout = function() {
  localStorage.removeItem("fc_me");
  state.myName = null;
  state.myRatings = {};
  state.screen = "name";
  render();
};

window.deleteMyPhoto = async function() {
  if (!state.shared || !state.myName) return;
  const newPhotos = { ...state.shared.photos, today: { ...state.shared.photos.today } };
  delete newPhotos.today[state.myName];
  const newShared = { ...state.shared, photos: newPhotos };
  const ok = await saveShared(newShared);
  if (ok) { state.shared = newShared; }
  render();
};

window.handleConfigSave = handleConfigSave;
window.selectName = selectName;
window.switchTab = switchTab;
window.previewRating = previewRating;
window.saveRating = saveRating;
window.handleUpload = handleUpload;
window.advanceDay = advanceDay;
window.loadAndRender = loadAndRender;

boot();

window.openLightbox = function(src, name) {
  const lb = document.getElementById("lightbox");
  lb.querySelector("img").src = src;
  lb.querySelector(".lightbox-name").textContent = name;
  lb.classList.add("open");
};
window.closeLightbox = function() {
  document.getElementById("lightbox").classList.remove("open");
};
